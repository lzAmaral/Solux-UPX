spring.application.name=SoluxAPI

# DataSource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/${MYSQL_DATABASE:solux_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:solux_user}
spring.datasource.password=${MYSQL_PASSWORD:solux_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.user=${MYSQL_USER:solux_user}
spring.flyway.password=${MYSQL_PASSWORD:solux_password}
spring.flyway.url=jdbc:mysql://localhost:3306/${MYSQL_DATABASE:solux_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Spring Security - Credenciais via ENV
spring.security.user.name=${API_ADMIN_USER:admin}
spring.security.user.password=${API_ADMIN_PASSWORD:admin123}
