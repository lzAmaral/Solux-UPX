spring.application.name=SoluxAPI

# DataSource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/solux_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=solux_user
spring.datasource.password=solux_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.user=solux_user
spring.flyway.password=solux_password
spring.flyway.url=jdbc:mysql://localhost:3306/solux_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Spring Security - Credenciais fixas para desenvolvimento
spring.security.user.name=admin
spring.security.user.password=admin123
